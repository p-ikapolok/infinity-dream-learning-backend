version: "3.8"

services:

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: silicon_world
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/silicon_world
      JWT_SECRET: devsecret
      TIMEZONE: Africa/Nairobi
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - postgres
      - redis

volumes:
  postgres-data: