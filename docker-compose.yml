version: "3.8"

services:

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env   # Make sure DATABASE_URL points to your Render PostgreSQL
    depends_on:
      - redis
    command: sh -c "npm install && npm run build && npm run start:prod"